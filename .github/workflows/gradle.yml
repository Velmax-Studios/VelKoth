name: Build VelKoth

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'

    - name: Make gradlew executable
      run: chmod +x gradlew

    - name: Build
      run: ./gradlew build

    - name: Upload VelKoth JAR
      uses: actions/upload-artifact@v4
      with:
        name: VelKoth
        path: build/libs/*.jar
